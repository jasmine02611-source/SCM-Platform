<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 主背景圆形 - 蓝色渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <linearGradient id="sGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="rgba(0,0,0,0.3)" />
    </filter>
  </defs>

  <!-- 外圆环 -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGradient)" stroke="#1e3a8a" stroke-width="1.5" filter="url(#shadow)" />

  <!-- 中间立体字母 S -->
  <g filter="url(#shadow)">
    <!-- S字母主体 -->
    <path d="M 32,20
             C 38,20 44,22 44,28
             C 44,32 40,34 36,34
             C 32,34 28,36 28,40
             C 28,44 32,46 38,46
             L 38,42
             C 34,42 30,40 30,38
             C 30,36 32,34 36,34
             C 40,34 44,32 44,28
             C 44,24 40,22 36,22
             C 32,22 28,24 28,28
             L 24,28
             C 24,22 28,18 32,18
             C 36,18 40,20 42,22
             Z"
          fill="url(#sGradient)" stroke="#1d4ed8" stroke-width="0.5" />

    <!-- S字母高光 -->
    <path d="M 32,20
             C 38,20 42,22 42,26
             Q 40,24 36,24
             C 32,24 28,26 28,30
             L 28,32
             C 28,30 30,28 34,28
             Z"
          fill="#fef3c7" fill-opacity="0.7" stroke="none" />
  </g>

  <!-- 环绕装饰元素 - 对称设计 -->
  <g stroke="#1e3a8a" stroke-width="1.5" fill="none">
    <!-- 内圈装饰环 -->
    <circle cx="32" cy="32" r="24" stroke-dasharray="2,2" opacity="0.6" />


    <!-- 对角线连接线 -->
    <line x1="20" y1="20" x2="26" y2="26" opacity="0.5" />
    <line x1="44" y1="20" x2="38" y2="26" opacity="0.5" />
    <line x1="20" y1="44" x2="26" y2="38" opacity="0.5" />
    <line x1="44" y1="44" x2="38" y2="38" opacity="0.5" />

    <!-- 外圈装饰弧线 -->
    <path d="M 20,12
             A 12,12 0 0,1 44,12"
          opacity="0.4" />
    <path d="M 44,52
             A 12,12 0 0,1 20,52"
          opacity="0.4" />
    <path d="M 12,20
             A 12,12 0 0,0 12,44"
          opacity="0.4" />
    <path d="M 52,44
             A 12,12 0 0,0 52,20"
          opacity="0.4" />
  </g>

  <!-- 中心高亮点 -->
  <circle cx="32" cy="32" r="1.5" fill="#fef3c7" opacity="0.8" />
</svg>